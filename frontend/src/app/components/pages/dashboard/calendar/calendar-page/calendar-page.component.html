<div class="row">
  <div class="col-12">
    <app-card cardTitle="カレンダー">
      <app-calendar-view
        [events]="calendarEvents"
        [loading]="loading"
        [error]="error || moveError"
        (dateRangeChange)="onDateRangeChange($event)"
        (todoClick)="onTodoClick($event)"
        (todoMove)="onTodoMove($event)"
      />
    </app-card>
  </div>
</div>
