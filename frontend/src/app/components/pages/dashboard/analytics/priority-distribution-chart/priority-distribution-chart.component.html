<div class="priority-distribution-chart">
  @if (loading) {
    <p class="text-muted mb-0">読み込み中…</p>
  } @else if (!hasAny) {
    <p class="text-muted mb-0">表示する Todo がありません。</p>
  } @else {
    <apx-chart
      [series]="chartSeries"
      [chart]="chart"
      [plotOptions]="plotOptions"
      [dataLabels]="dataLabels"
      [xaxis]="xaxis"
      [colors]="colors"
      [legend]="legend"
    />
  }
</div>
