<div class="tag-distribution-chart">
  @if (loading) {
    <p class="text-muted mb-0">読み込み中…</p>
  } @else if (!hasRows) {
    <p class="text-muted mb-0">タグ付きの Todo がまだありません。</p>
  } @else {
    <apx-chart
      [series]="chartSeries"
      [chart]="chart"
      [plotOptions]="plotOptions"
      [dataLabels]="dataLabels"
      [xaxis]="xaxis"
      [colors]="colors"
    />
  }
</div>
