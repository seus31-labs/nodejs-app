<form [formGroup]="form" (ngSubmit)="onSubmit()" class="todo-form">
  @if (templates.length > 0 && !editingTodo && !isSubtaskMode) {
    <div class="mb-2">
      <label for="todo-template" class="form-label">テンプレートから入力（任意）</label>
      <select
        id="todo-template"
        class="form-select"
        (change)="onTemplateSelect($event)"
      >
        <option value="">選択してください</option>
        @for (t of templates; track t.id) {
          <option [value]="t.id">{{ t.name }} — {{ t.title }}</option>
        }
      </select>
    </div>
  }
  <div class="mb-2">
    <div class="d-flex align-items-center gap-2 flex-wrap">
      <label for="todo-title" class="form-label mb-0">タイトル <span class="text-danger">*</span></label>
      <app-voice-input (textRecognized)="onVoiceText($event)" />
    </div>
    <input
      id="todo-title"
      type="text"
      class="form-control"
      formControlName="title"
      [placeholder]="isSubtaskMode ? 'サブタスクのタイトル' : 'Todo のタイトル'"
      maxlength="255"
    />
    @if (form.get('title')?.invalid && form.get('title')?.touched) {
      <div class="invalid-feedback d-block">タイトルを入力してください。</div>
    }
  </div>
  <div class="mb-2">
    <label for="todo-description" class="form-label">説明</label>
    <textarea
      id="todo-description"
      class="form-control"
      formControlName="description"
      rows="2"
      placeholder="詳細（任意）"
    ></textarea>
  </div>
  <div class="row mb-2">
    <div class="col-md-6" [class.col-12]="isSubtaskMode">
      <label for="todo-priority" class="form-label">優先度</label>
      <select id="todo-priority" class="form-select" formControlName="priority">
        <option value="low">low</option>
        <option value="medium">medium</option>
        <option value="high">high</option>
      </select>
    </div>
    @if (!isSubtaskMode) {
      <div class="col-md-6">
      <label for="todo-dueDate" class="form-label">期限</label>
      <input
        id="todo-dueDate"
        type="date"
        class="form-control"
        formControlName="dueDate"
      />
      </div>
    }
  </div>
  @if (projects.length > 0 && !isSubtaskMode) {
    <div class="mb-2">
      <label for="todo-project" class="form-label">プロジェクト</label>
      <select id="todo-project" class="form-select" formControlName="projectId">
        <option [ngValue]="null">なし</option>
        @for (project of projects; track project.id) {
          <option [ngValue]="project.id">{{ project.name }}</option>
        }
      </select>
    </div>
  }
  @if (!isSubtaskMode) {
    <div class="mb-3">
      <app-recurrence-form
        [value]="recurrence"
        (recurrenceChanged)="onRecurrenceChanged($event)"
      />
    </div>
  }
  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
      {{ editingTodo ? '更新' : (isSubtaskMode ? 'サブタスクを作成' : '作成') }}
    </button>
    @if (editingTodo) {
      <button type="button" class="btn btn-outline-secondary" (click)="onCancel()">キャンセル</button>
    }
  </div>
</form>
