<div class="row">
  <div class="col-12">
    <app-card cardTitle="Todo リスト（{{ todos.length }} 件）">
      <div class="mb-3">
        <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
          <app-search-bar #searchBar (searchTerm)="onSearch($event)" />
          <button type="button" class="btn btn-outline-secondary btn-sm" (click)="openAdvancedSearch()">
            詳細検索
          </button>
          <button type="button" class="btn btn-outline-secondary btn-sm" (click)="exportAsJson()">
            エクスポート JSON
          </button>
          <button type="button" class="btn btn-outline-secondary btn-sm" (click)="exportAsCsv()">
            エクスポート CSV
          </button>
          <button type="button" class="btn btn-outline-secondary btn-sm" (click)="openImportDialog()">
            インポート
          </button>
        </div>
        <div class="row g-2 align-items-center flex-wrap">
          <div class="col-auto">
            <label class="form-label mb-0 me-1">完了</label>
            <select
              class="form-select form-select-sm"
              style="width: auto;"
              [value]="completedFilterValue"
              (change)="onCompletedFilterChange($event)"
            >
              <option value="">すべて</option>
              <option value="false">未完了</option>
              <option value="true">完了</option>
            </select>
          </div>
          <div class="col-auto">
            <label class="form-label mb-0 me-1">優先度</label>
            <select
              class="form-select form-select-sm"
              style="width: auto;"
              [value]="priorityFilterValue"
              (change)="onPriorityFilterChange($event)"
            >
              <option value="">すべて</option>
              <option value="low">low</option>
              <option value="medium">medium</option>
              <option value="high">high</option>
            </select>
          </div>
          @if (allProjects.length > 0) {
            <div class="col-auto">
              <label class="form-label mb-0 me-1">プロジェクト</label>
              <select
                class="form-select form-select-sm"
                style="width: auto;"
                [value]="projectFilterValue"
                (change)="onProjectFilterChange($event)"
              >
                <option value="">すべて</option>
                @for (project of allProjects; track project.id) {
                  <option [value]="project.id">{{ project.name }}</option>
                }
              </select>
            </div>
          }
          <div class="col-auto">
            <app-sort-selector
              [sortBy]="sortBy"
              [sortOrder]="sortOrder"
              (sortChanged)="onSortChange($event)"
            />
          </div>
          @if (allTags.length > 0) {
            <div class="col-12 col-md-auto mt-1 mt-md-0">
              <span class="me-1 small text-muted">タグ:</span>
              @for (tag of allTags; track tag.id) {
                <button
                  type="button"
                  class="badge rounded-pill me-1 mb-1"
                  [style.background-color]="filterTagIds.includes(tag.id) ? tag.color : '#e9ecef'"
                  [class.text-dark]="filterTagIds.includes(tag.id) ? isLight(tag.color) : true"
                  [class.text-white]="filterTagIds.includes(tag.id) && !isLight(tag.color)"
                  (click)="toggleTagFilter(tag.id)"
                >
                  {{ tag.name }}
                </button>
              }
            </div>
          }
        </div>
      </div>

      @if (editingTodo) {
        <app-todo-form
          [editingTodo]="editingTodo"
          [projects]="allProjects"
          [templates]="allTemplates"
          (submitForm)="onSubmitForm($event)"
          (cancel)="onCancelEdit()"
        />
      } @else {
        <app-todo-form
          [projects]="allProjects"
          [templates]="allTemplates"
          (submitForm)="onSubmitForm($event)"
        />
      }

      <hr class="my-3" />

      <app-bulk-action-bar
        [selectedCount]="selectedIds.length"
        (bulkComplete)="onBulkComplete()"
        (bulkDelete)="onBulkDelete()"
        (bulkArchive)="onBulkArchive()"
        (bulkAddTag)="onBulkAddTag($event)"
        (clearSelection)="selectedIds = []"
      />

      <app-todo-list
        [todos]="todos"
        [allTags]="allTags"
        [loading]="loading"
        [error]="error"
        [dragDisabled]="sortBy !== 'sortOrder'"
        [selectedIds]="selectedIds"
        (selectionChange)="onSelectionChange($event)"
        (toggle)="onToggle($event)"
        (edit)="onEdit($event)"
        (delete)="onDelete($event)"
        (archive)="onArchived($event)"
        (reorder)="onReorder($event)"
        (tagRemoved)="onTagRemoved($event)"
        (tagAdded)="onTagAdded($event)"
      />
    </app-card>
  </div>
</div>
