<h2 mat-dialog-title>ショートカットキー</h2>
<mat-dialog-content>
  @if (entries.length === 0) {
    <p class="text-muted small mb-0">登録されているショートカットはありません。</p>
  } @else {
    <table class="table table-sm table-borderless mb-0">
      <tbody>
        @for (entry of entries; track entry.keys) {
          <tr>
            <td class="text-nowrap"><kbd class="shortcut-kbd">{{ entry.keys }}</kbd></td>
            <td>{{ entry.description }}</td>
          </tr>
        }
      </tbody>
    </table>
  }
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>閉じる</button>
</mat-dialog-actions>
