<div class="row">
  <div class="col-12">
    <app-card cardTitle="プロジェクト管理">
      @if (error) {
        <div class="alert alert-danger" role="alert">{{ error }}</div>
      }

      <div class="mb-4">
        @if (editingProject) {
          <app-project-form
            [editingProject]="editingProject"
            (submitForm)="onSubmitForm($event)"
            (cancel)="onCancelEdit()"
          />
        } @else {
          <app-project-form
            (submitForm)="onSubmitForm($event)"
          />
        }
      </div>

      <hr class="my-3" />

      <app-project-list
        [projects]="projects"
        [progressMap]="progressMap"
        [loading]="loading"
        (edit)="onEdit($event)"
        (delete)="onDelete($event)"
        (archive)="onArchive($event)"
      />
    </app-card>
  </div>
</div>
