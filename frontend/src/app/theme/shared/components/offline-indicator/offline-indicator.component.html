@if ((networkStatus.onlineChanges | async) === false) {
  <span class="offline-badge" title="オフラインです。接続回復後に自動で同期します。">
    <i class="feather icon-wifi" aria-hidden="true"></i>
    <span class="ms-1">オフライン</span>
  </span>
} @else if ((syncService.syncingChanges | async) === true) {
  <span class="sync-badge" title="同期中です。">
    <i class="feather icon-refresh-cw" aria-hidden="true"></i>
    <span class="ms-1">同期中...</span>
  </span>
}
