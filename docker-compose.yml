services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    env_file:
      - .env.local.backend
    environment:
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - nodejs-app-backend-node-modules:/app/node_modules
    ports:
      - "${EXPOSE_BACKEND_PORT}:3000"
    depends_on:
      - db

  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_USER: ${DATABASE_USER}
    ports:
      - "${EXPOSE_DATABASE_PORT}:3306"
    volumes:
      - nodejs-app-database:/var/lib/mysql

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    env_file:
      - .env.local.frontend
    ports:
      - "${EXPOSE_FRONTEND_PORT}:4200"
    volumes:
      - ./frontend:/app
      - nodejs-app-frontend-node-modules:/app/node_modules
    tty: true
    command: sh -c "ng serve --host=0.0.0.0"

volumes:
  nodejs-app-frontend-node-modules:
  nodejs-app-backend-node-modules:
  nodejs-app-database: